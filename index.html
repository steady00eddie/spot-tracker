<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPOT Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    #map { height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>

    var OS_API_KEY = 'lfIctO22BunGnfxDp0hLcHdnoYxHnctQ';

    function osTile(style) {
      return L.tileLayer(
        'https://api.os.uk/maps/raster/v1/zxy/Road_27700/{z}/{x}/{y}.png?key=lfIctO22BunGnfxDp0hLcHdnoYxHnctQ',
        {
          attribution: '© Crown copyright and database rights 2024 Ordnance Survey',
          maxZoom: 20,
          minZoom: 7
        }
      );
    }

    var outdoor = osTile('Outdoor_3857');
    var road    = osTile('Road_3857');
    var light   = osTile('Light_3857');

    var map = L.map('map', { layers: [outdoor] }).setView([51.70, 0.30], 12);

    L.control.layers({
      'Outdoor': outdoor,
      'Road':    road,
      'Light':   light
    }).addTo(map);

  </script>
</body>
</html>
