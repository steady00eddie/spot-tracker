<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPOT Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    #map { height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>

    var OS_API_KEY = 'lfIctO22BunGnfxDp0hLcHdnoYxHnctQ';

    var map = L.map('map').setView([51.74, -0.02], 12);

    L.tileLayer(
      'https://api.os.uk/maps/raster/v1/zxy/Leisure_27700/{z}/{x}/{y}.png?key=lfIctO22BunGnfxDp0hLcHdnoYxHnctQ' + OS_API_KEY,
      {
        attribution: '© Crown copyright and database rights 2024 Ordnance Survey',
        maxZoom: 20,
        minZoom: 7
      }
    ).addTo(map);

  </script>
</body>
</html>
